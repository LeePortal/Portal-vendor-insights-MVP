<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Portal · Market Insights</title>
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#27272A" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300;0,400;0,600;0,700;0,800;1,400&display=swap" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons" />
  </head>
  <body>
    <app-root>
      <div style="position:fixed;inset:0;background:#27272A;display:flex;align-items:center;justify-content:center;font-family:'Open Sans',Helvetica,Arial,sans-serif">
        <div style="width:280px;text-align:center;position:relative;top:-40px">
          <img src="https://portal.io/assets/images/logo-index.png" alt="Portal" style="max-width:160px;margin-bottom:70px" onerror="this.style.display='none';var w=document.getElementById('pwm');if(w)w.style.display='block'" />
          <div id="pwm" style="display:none;color:#fff;font-weight:800;font-size:26px;margin-bottom:70px">Portal<span style="color:#FF5000">.</span></div>
          <div style="height:5px;background:#3A3A3F;border-radius:50px"><div style="height:100%;width:70%;background:#FF5000;border-radius:50px;box-shadow:0 2px 7px rgba(255,80,0,.4)"></div></div>
        </div>
      </div>
    </app-root>
  </body>
</html>
